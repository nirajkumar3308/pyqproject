<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - BEU PYQ Hub</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #141E30, #243B55);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 28px;
    }

    .login-box, .admin-panel {
      background-color: #1f2d3d;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.1);
      width: 300px;
      display: none;
    }

    .login-box.active, .admin-panel.active {
      display: block;
    }

    input[type="text"], input[type="password"], input[type="file"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #00bcd4;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0288d1;
    }

    .upload-label {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Admin Login - BEU PYQ Hub</h1>

  <!-- Login Form -->
  <div class="login-box active" id="loginBox">
    <input type="text" id="userid" placeholder="Enter Admin User ID" />
    <input type="password" id="password" placeholder="Enter Password" />
    <button onclick="login()">Login</button>
  </div>

  <!-- Admin Panel After Login -->
  <div class="admin-panel" id="adminPanel">
    <h2>Welcome, Admin</h2>
    <div class="upload-label">Upload PYQ File (PDF):</div>
    <input type="file" id="fileUpload" accept=".pdf"/>
    <button onclick="uploadFile()">Upload</button>
    
    <div class="upload-label">Change Website Title (Coming Soon)</div>
    <input type="text" placeholder="New Title (Disabled)" disabled />
  </div>

  <script>
    function login() {
      const userid = document.getElementById("userid").value;
      const password = document.getElementById("password").value;

      // Simple dummy check (use backend or Firebase later)
      if (userid === "admin" && password === "admin123") {
        document.getElementById("loginBox").classList.remove("active");
        document.getElementById("adminPanel").classList.add("active");
      } else {
        alert("Invalid credentials! Try again.");
      }
    }

    function uploadFile() {
      const file = document.getElementById("fileUpload").files[0];
      if (file) {
        alert(`File "${file.name}" selected.\nUpload functionality will be connected to backend or Firebase later.`);
      } else {
        alert("Please choose a file first.");
      }
    }
  </script>
 
</body>
</html>
