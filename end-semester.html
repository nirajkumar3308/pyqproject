<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>End Semester Questions | BEU PYQ Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(to right, #fff3e0, #fbe9e7);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #212121;
    }

    header {
      background-color: #0d47a1;
      color: #fff;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
    }

    nav button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #1976d2;
      color: white;
      transition: 0.3s ease;
      cursor: pointer;
    }

    nav button:hover {
      background: #ffca28;
      color: #0d47a1;
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    main {
      text-align: center;
      padding: 60px 20px;
      flex-grow: 1;
    }

    main h1 {
      font-size: 44px;
      color: #0d47a1;
      margin-bottom: 10px;
    }

    .quote {
      font-size: 18px;
      color: #555;
      margin-bottom: 40px;
      font-style: italic;
    }

    .year-box {
      max-width: 350px;
      margin: 0 auto;
      padding: 20px;
      border-radius: 12px;
      background-color: #e3f2fd;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .year-box h2 {
      font-size: 24px;
      color: #0d47a1;
      margin-bottom: 20px;
    }

    .years {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .years button {
      padding: 10px 20px;
      background-color: #1e88e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s ease;
    }

    .years button:hover {
      background-color: #ffeb3b;
      color: #0d47a1;
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #777;
      background-color: #e3f2fd;
    }

    @media (max-width: 600px) {
      .title {
        font-size: 18px;
        margin-bottom: 10px;
      }

      nav button {
        font-size: 14px;
        padding: 8px 14px;
      }

      main h1 {
        font-size: 32px;
      }

      .years button {
        font-size: 14px;
        padding: 8px 16px;
      }
    }
  </style>
</head>
